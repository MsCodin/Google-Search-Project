<!doctype html>
<html lang="en">
  <head>
    <title>Search</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form action="https://www.google.com/search">
      <div>
        <input type="text" name="as_q" placeholder="All these words" />
        <input
          type="text"
          name="as_epq"
          placeholder="This exact word or phrase"
        />
        <input type="text" name="as_oq" placeholder="Any of these words" />
        <input type="text" name="as_eq" placeholder="None of these words" />
        <input type="submit" value="Google Advanced Search" />
      </div>
    </form>

    <div class="nav-links">
      <a href="index.html">Google Search</a>
    </div>
  </body>
</html>
